---
- name: Deploy SDD Navigator Stack to Kubernetes
  hosts: k8s
  become: false
  tasks:
    - name: Add Helm repos
      kubernetes.core.helm_repository:
        name: bitnami
        repo_url: https://charts.bitnami.com/bitnami

    - name: Deploy PostgreSQL
      kubernetes.core.helm:
        name: postgres
        chart_ref: bitnami/postgresql
        release_namespace: sdd-navigator
        create_namespace: true
        values_files:
          - ../../values/dev-values.yaml

    - name: Deploy Rust API
      kubernetes.core.helm:
        name: rust-api
        chart_ref: ../../charts/rust-api
        release_namespace: sdd-navigator
        values_files:
          - ../../values/dev-values.yaml

    - name: Deploy Next.js Frontend
      kubernetes.core.helm:
        name: nextjs-frontend
        chart_ref: ../../charts/nextjs-frontend
        release_namespace: sdd-navigator
        values_files:
          - values/dev-values.yaml

          
